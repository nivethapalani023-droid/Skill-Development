<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        h1{
            text-align:left;
        }

        h2{
            text-align:right;
        }

        h3{
            text-align:center;
        }

        h4{
            text-align:justify
        }
    </style>

</head>
<body>

    <h1>Text is on the left</h1>
    <h2>Text is on the right</h2>
    <h3>Text is on the center</h3>
    <h4>Text is justified</h4>

</body>
</html>
