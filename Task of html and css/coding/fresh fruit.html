<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
        body{
font-family: Arial, sans-serif;
background:#f8fff6;
margin:0;
padding:0;
}

.section-title{
text-align:center;
font-size:35px;
margin:40px 0;
color:#2e7d32;
}

.fruits-section{
width:90%;
margin:auto;
}

.fruit-container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.fruit-card{
background:white;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
padding:15px;
text-align:center;
transition:0.3s;
}

.fruit-card:hover{
transform:scale(1.05);
}

.fruit-card img{
width:100%;
height:200px;
object-fit:cover;
border-radius:10px;
}

.fruit-card h3{
margin:10px 0;
color:#333;
}

.fruit-card p{
font-size:14px;
color:#555;
}

.fruit-card span{
display:block;
margin-top:10px;
font-weight:bold;
color:#e65100;
}
    </style>

<section class="fruits-section">
    <h2 class="section-title">Fresh Fruits Collection</h2>

    <div class="fruit-container">

        <div class="fruit-card">
            <img src="C:\Users\laksh\Downloads\apple.jpg" alt="Apple">
            <h3>Apple</h3>
            <p>Fresh red apples directly from farms.</p>
            <span>₹120 / BOX</span>
        </div>

        <div class="fruit-card">
            <img src="C:\Users\laksh\Downloads\banana.jpg" alt="Banana">
            <h3></h3>
            <p>Sweet and healthy bananas.</p>
            <span>₹60 / BOX</span>
        </div>

        <div class="fruit-card">
            <img src="C:\Users\laksh\Downloads\orange.jpg" alt="Orange">
            <h3>Orange</h3>
            <p>Vitamin C rich juicy oranges.</p>
            <span>₹90 / BOX</span>
        </div>

        <div class="fruit-card">
            <img src="C:\Users\laksh\Downloads\mango.jpg" alt="Mango">
            <h3>Mango</h3>
            <p>The king of fruits.</p>
            <span>₹150 / BOX</span>
        </div>
        
        <div class="fruit-card">
            <img src="C:\Users\laksh\Downloads\pineapple.jpg" alt="Pineapple">
            <h3>Pineapple</h3>
            <p>sweet tropical pineapple.</p>
            <span>₹190 / BOX</span
          </div>
        
        
    </div>


</section>

</body>
</html>
</body>
</html>
