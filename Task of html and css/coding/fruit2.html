<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

/* 🌈 Creative Fruit Background */
body {
    min-height: 100vh;
    background: linear-gradient(135deg, #ffecd2, #fcb69f);
    color: #333;
}

/* Section */
.explore {
    text-align: center;
    padding: 60px 20px;
}

/* Heading */
.explore h1 {
    font-size: 42px;
    font-weight: bold;
    margin-bottom: 50px;
    color: #d35400;
}

/* 🔥 Grid Layout (Fix your structure) */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 30px;
    width: 80%;
    margin: auto;
}

/* 🧊 Card Design */
.card {
    background: white;
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    transition: 0.3s;
}

/* Image */
.card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    border-radius: 15px;
}

/* Title */
.card h2 {
    margin-top: 15px;
    font-size: 20px;
    color: #e67e22;
}

/* Hover */
.card:hover {
    transform: translateY(-8px);
    box-shadow: 0 15px 30px rgba(0,0,0,0.25);
}

/* ❌ REMOVE default link style */
a {
    text-decoration: none;
}
</style>
