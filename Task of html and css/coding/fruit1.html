        *{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial, sans-serif;
}

body{
background:#f8fff4;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 50px;
background:#2e7d32;
color:white;
}

nav a{
color:white;
text-decoration:none;
margin-left:20px;
font-weight:bold;
}

nav a:hover{
text-decoration:underline;
}

/* HERO SECTION */

.hero{
height:400px;
display:flex;
align-items:center;
justify-content:center;
text-align:center;

background:
linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
url("https://images.unsplash.com/photo-1610832958506-aa56368176cf")
center/cover no-repeat;

color:white;
}

.hero h2{
font-size:40px;
margin-bottom:10px;
}

.hero button{
padding:12px 25px;
background:#ff9800;
border:none;
font-size:18px;
color:white;
cursor:pointer;
margin-top:20px;
}

.hero button:hover{
background:#e68900;
}

/* FRUITS SECTION */

.fruits{
padding:60px;
text-align:center;
}

.fruit-container{
display:flex;
justify-content:center;
gap:30px;
margin-top:30px;
flex-wrap:wrap;
}

.fruit-card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
width:200px;
transition:0.3s;
}

.fruit-card:hover{
transform:scale(1.05);
}

.fruit-card img{
width:100%;
border-radius:10px;
}

.fruit-card h3{
margin:10px 0;
}

/* FOOTER */

footer{
text-align:center;
padding:20px;
background:#2e7d32;
color:white;
margin-top:40px;
}

/* MOBILE RESPONSIVE */

@media(max-width:768px){

header{
flex-direction:column;
text-align:center;
}

nav{
margin-top:10px;
}

nav a{
margin:10px;
display:inline-block;
}

.hero h2{
font-size:28px;
}

}
